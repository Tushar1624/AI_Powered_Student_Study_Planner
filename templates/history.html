{% extends "base.html" %}

{% block content %}

<h2>

Study History

</h2>

<table class="table table-bordered">

<tr>

<th>ID</th>

<th>Score</th>

<th>Study Plan</th>

<th>Recommendations</th>

<th>Date</th>

</tr>

{% for row in records %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[2] }}</td>

<td>{{ row[3] }}</td>

<td>{{ row[4] }}</td>

<td>{{ row[5] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
