{% extends "base.html" %}

{% block content %}
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>AI Study Planner</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

<a href="/">Home</a>

<a href="/dashboard">
Dashboard
</a>

<a href="/history">
History
</a>

</nav>

<h1>

AI Study Planner

</h1>

<div class="card p-4">

<form>

...
...

</form>

</div>

<form action="/generate" method="POST">

<h3>Subject 1</h3>

<input
type="text"
name="subject"
placeholder="Math"
required>

<input
type="date"
name="exam_date"
required>

<input
type="number"
name="difficulty"
min="1"
max="10"
required>

<br><br>

<h3>Subject 2</h3>

<input
type="text"
name="subject"
placeholder="Physics"
required>

<input
type="date"
name="exam_date"
required>

<input
type="number"
name="difficulty"
min="1"
max="10"
required>

<br><br>

<h3>Subject 3</h3>

<input
type="text"
name="subject"
placeholder="Programming"
required>

<input
type="date"
name="exam_date"
required>

<input
type="number"
name="difficulty"
min="1"
max="10"
required>

<br><br>

<label>

Available Study Hours

</label>

<input
type="number"
step="0.5"
name="available_hours"
required>

<br><br>

<button type="submit">

Generate Plan

</button>

</form>

</body>

</html>

{% endblock %}
